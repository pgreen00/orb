<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="outerMelt" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#4dff4d"/>
      <stop offset="40%" stop-color="#00cc00"/>
      <stop offset="100%" stop-color="#003300"/>
    </radialGradient>
    <radialGradient id="cushion" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="70%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#1a3310"/>
    </radialGradient>
    <radialGradient id="driver" cx="48%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#66ff66"/>
      <stop offset="30%" stop-color="#00dd00"/>
      <stop offset="70%" stop-color="#008800"/>
      <stop offset="100%" stop-color="#003300"/>
    </radialGradient>
    <radialGradient id="driverCore" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#aaffaa"/>
      <stop offset="50%" stop-color="#22cc22"/>
      <stop offset="100%" stop-color="#006600"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff00" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00ff00" stop-opacity="0"/>
    </radialGradient>
    <filter id="meltShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feOffset dx="0" dy="3" result="offset"/>
      <feFlood flood-color="#00ff00" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="offset" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Subtle glow behind everything -->
  <ellipse cx="200" cy="197" rx="130" ry="135" fill="url(#glow)" filter="url(#innerGlow)"/>

  <!-- Outer ear cup shell - clean ellipse with molten drip accents -->
  <ellipse cx="200" cy="197" rx="155" ry="160" fill="url(#outerMelt)" filter="url(#meltShadow)"/>

  <!-- Ear cushion ring - clean ellipse -->
  <ellipse cx="200" cy="197" rx="122" ry="127" fill="url(#cushion)" stroke="#004400" stroke-width="2.5"/>

  <!-- Cushion texture marks - balanced pairs -->
  <g fill="#002200" opacity="0.5">
    <ellipse cx="200" cy="74" rx="8" ry="3"/>
    <ellipse cx="242" cy="82" rx="7" ry="3" transform="rotate(25 242 82)"/>
    <ellipse cx="158" cy="82" rx="7" ry="3" transform="rotate(-25 158 82)"/>
    <ellipse cx="318" cy="197" rx="3" ry="7"/>
    <ellipse cx="82" cy="197" rx="3" ry="7"/>
    <ellipse cx="252" cy="310" rx="7" ry="3" transform="rotate(-25 252 310)"/>
    <ellipse cx="148" cy="310" rx="7" ry="3" transform="rotate(25 148 310)"/>
  </g>

  <!-- Driver cone outer ring -->
  <ellipse cx="200" cy="197" rx="88" ry="92" fill="none" stroke="#00aa00" stroke-width="3" opacity="0.6"/>

  <!-- Driver membrane -->
  <ellipse cx="200" cy="197" rx="82" ry="86" fill="url(#driver)" opacity="0.9"/>

  <!-- Driver dust cap - central dome -->
  <ellipse cx="200" cy="197" rx="38" ry="40" fill="url(#driverCore)" filter="url(#meltShadow)"/>

  <!-- Specular highlight on dust cap -->
  <ellipse cx="194" cy="188" rx="14" ry="9" fill="#ccffcc" opacity="0.25" transform="rotate(-15 194 188)"/>

  <!-- Molten veins - straight lines radiating from center -->
  <g stroke="#00ff00" stroke-width="1.4" fill="none" opacity="0.35">
    <!-- Cardinal directions -->
    <line x1="200" y1="157" x2="200" y2="94"/>
    <line x1="200" y1="237" x2="200" y2="306"/>
    <line x1="238" y1="197" x2="308" y2="197"/>
    <line x1="162" y1="197" x2="92" y2="197"/>
    <!-- Diagonals -->
    <line x1="227" y1="169" x2="278" y2="118"/>
    <line x1="173" y1="169" x2="122" y2="118"/>
    <line x1="227" y1="225" x2="278" y2="276"/>
    <line x1="173" y1="225" x2="122" y2="276"/>
    <!-- Sub-diagonals -->
    <line x1="236" y1="182" x2="300" y2="152"/>
    <line x1="164" y1="182" x2="100" y2="152"/>
    <line x1="236" y1="212" x2="300" y2="242"/>
    <line x1="164" y1="212" x2="100" y2="242"/>
    <line x1="215" y1="159" x2="242" y2="100"/>
    <line x1="185" y1="159" x2="158" y2="100"/>
    <line x1="215" y1="235" x2="242" y2="294"/>
    <line x1="185" y1="235" x2="158" y2="294"/>
  </g>

  <!-- Small molten blobs at vein endpoints - mirrored pairs -->
  <circle cx="278" cy="118" r="4" fill="#00bb00" opacity="0.5"/>
  <circle cx="122" cy="118" r="4" fill="#00bb00" opacity="0.5"/>
  <circle cx="308" cy="197" r="3" fill="#00aa00" opacity="0.4"/>
  <circle cx="92" cy="197" r="3" fill="#00aa00" opacity="0.4"/>
  <circle cx="278" cy="276" r="3.5" fill="#009900" opacity="0.45"/>
  <circle cx="122" cy="276" r="3.5" fill="#009900" opacity="0.45"/>
  <circle cx="300" cy="152" r="2.5" fill="#00aa00" opacity="0.35"/>
  <circle cx="100" cy="152" r="2.5" fill="#00aa00" opacity="0.35"/>
  <circle cx="300" cy="242" r="2.5" fill="#00aa00" opacity="0.35"/>
  <circle cx="100" cy="242" r="2.5" fill="#00aa00" opacity="0.35"/>

  <!-- Hot spots shimmer - mirrored -->
  <ellipse cx="160" cy="142" rx="28" ry="14" fill="#00ff00" opacity="0.04" transform="rotate(-35 160 142)"/>
  <ellipse cx="240" cy="252" rx="28" ry="14" fill="#00ff00" opacity="0.03" transform="rotate(35 240 252)"/>
</svg>
